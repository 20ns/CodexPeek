name: Bug report
description: Report a problem with CodexPeek
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.4"
  - type: input
    id: codex
    attributes:
      label: Codex CLI version
      placeholder: "e.g. codex-cli 0.110.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Tell us how to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
